<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RobuxRey</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#e5e7eb;background-image:linear-gradient(rgba(255,255,255,0.6),rgba(255,255,255,0.6)),linear-gradient(90deg,#d1d5db 1px,transparent 1px),linear-gradient(#d1d5db 1px,transparent 1px);background-size: cover,40px 40px,40px 40px;}
.header{background:white;padding:18px 24px;font-size:28px;font-weight:bold;color:#2d4cff;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);position:relative;}
.container{text-align:center;padding:60px 20px;}
.btn{background:#2d4cff;color:white;border:none;padding:20px 40px;border-radius:16px;font-size:22px;cursor:pointer;transition:0.3s;}
.btn:hover{transform:scale(1.08);}
.layer, .layer2{display:none;margin-top:40px;animation:fade 0.4s ease forwards;background: rgba(0,0,0,0.7);padding:40px 20px;border-radius:20px;}
.card{background:white;border-radius:24px;width:320px;margin:auto;overflow:hidden;box-shadow:0 25px 50px rgba(0,0,0,0.2);border:4px solid #2d4cff;cursor:pointer;transform:scale(0.6);opacity:0;animation:pop 0.4s forwards;}
.card:hover{transform:scale(1.05);}
.card-header{background:#2d4cff;color:white;padding:18px;font-weight:bold;font-size:24px;}
.card-body{padding:24px;}
.card-body h2{font-size:64px;margin:10px 0;color:#111;}
input{padding:16px;width:260px;border-radius:10px;border:1px solid #ccc;font-size:18px;}
.btn-wa{background:#25D366;color:white;border:none;padding:16px 24px;border-radius:10px;font-size:20px;margin-top:14px;cursor:pointer;transition:0.3s;}
.btn-wa:hover{transform:scale(1.08);}
#sidebar{position:fixed;top:0;left:-250px;width:250px;height:100%;background:#111;color:white;padding:20px;transition:0.3s;overflow-y:auto;z-index:5;}
#sidebar h3{margin-top:0;}
#hamburger{position:absolute;top:18px;left:18px;cursor:pointer;z-index:6;}
.bar{width:30px;height:4px;background:white;margin:5px 0;transition:0.3s;}
ul{list-style:none;padding-left:0;}
ul li{margin:6px 0;cursor:pointer;}
ul li:hover{color:#2d4cff;}
.confirmed{color:#4ade80;text-decoration:line-through;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
@keyframes pop{from{opacity:0; transform:scale(0.6);}to{opacity:1; transform:scale(1);}}
</style>
</head>
<body>

<div class="header">
  RobuxRey
  <div id="hamburger" onclick="toggleSidebar()">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
</div>

<div id="sidebar">
  <h3>Pesanan Public</h3>
  <ul id="publicList"></ul>
</div>

<div class="container">
  <button class="btn" onclick="showLayer1()">DAFTAR PRODUK</button>

  <div class="layer" id="layer1">
    <div class="card" onclick="showLayer2()">
      <div class="card-header">FREE ROBUX</div>
      <div class="card-body">
        <h2>FREE ROBUX</h2>
        <p>Hubungi admin</p>
      </div>
    </div>
  </div>

  <div class="layer2" id="layer2">
    <h3 style="color:white;">Masukkan Username Roblox</h3>
    <input type="text" id="user" placeholder="Username">
    <br>
    <button class="btn-wa" onclick="kirimWA()">Mau RBX Free?</button>
  </div>
</div>

<!-- Suara konfirmasi -->
<audio id="sound" src="https://freesound.org/data/previews/341/341695_5260873-lq.mp3"></audio>

<script>
let publicUsers = JSON.parse(localStorage.getItem('publicUsers')) || [];
updatePublicList();

function showLayer1(){document.getElementById("layer1").style.display="block";}
function showLayer2(){document.getElementById("layer2").style.display="block";}

function kirimWA(){
  let user = document.getElementById("user").value;
  if(!user){alert("Isi username dulu."); return;}

  if(!confirm("Yakin mau pesan free robux?")) return;

  // Tambahkan ke publicUsers
  publicUsers.push({name:user, confirmed:false});
  localStorage.setItem('publicUsers', JSON.stringify(publicUsers));
  updatePublicList();

  // Putar suara konfirmasi
  document.getElementById("sound").play();

  // Buka WA
  let pesan = "Halo saya ingin robux yang di pesan gratis. Username: " + user;
  window.open("https://wa.me/6282328188853?text=" + encodeURIComponent(pesan));
}

function updatePublicList(){
  let ul = document.getElementById('publicList');
  ul.innerHTML = '';
  publicUsers.forEach((u,i)=>{
    let li = document.createElement('li');
    li.textContent = (i+1) + "." + u.name;
    if(u.confirmed){li.classList.add('confirmed');}
    li.onclick = ()=>{
      if(!u.confirmed){
        u.confirmed=true;
        localStorage.setItem('publicUsers', JSON.stringify(publicUsers));
        document.getElementById("sound").play(); // suara konfirmasi
        updatePublicList();
      }
    }
    ul.appendChild(li);
  });
}

function toggleSidebar(){
  let sb = document.getElementById('sidebar');
  if(sb.style.left=='0px'){sb.style.left='-250px';}
  else{sb.style.left='0px';}
}
</script>

</body>
</html>
